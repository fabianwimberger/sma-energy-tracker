<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="energyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#1e293b" opacity="0.95"/>

  <!-- Lightning bolt -->
  <path d="M18 2 L11 16 L15 16 L14 30 L24 13 L18 13 L18 2 Z"
        fill="url(#energyGradient)"
        filter="url(#glow)"
        stroke="#fef3c7"
        stroke-width="0.5"/>

  <!-- Subtle energy waves -->
  <path d="M 6 20 Q 8 18 10 20" stroke="#3b82f6" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 22 20 Q 24 18 26 20" stroke="#3b82f6" stroke-width="1" fill="none" opacity="0.4"/>
</svg>